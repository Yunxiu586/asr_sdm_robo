/asr_sdm_svo:
  ros__parameters:

    grid_size: 30
    max_n_kfs: 10
    loba_num_iter: 0

    # -------------------------------------------------------------------------
    # Safe improvements over SVO defaults:
    #   - pyramid=4 (better fast-motion tolerance, small extra cost)
    #   - max_epi_search_steps=15000 (large inter-frame displacement)
    # -------------------------------------------------------------------------

    n_pyr_levels: 4
    max_epi_search_steps: 15000

    # Tracking robustness (lowered for handheld/downward rig)
    reproj_thresh: 2.0
    poseoptim_thresh: 2.0
    quality_min_fts: 20
    quality_max_drop_fts: 40
    kfselect_mindist: 0.12
    triang_min_corner_score: 20.0
