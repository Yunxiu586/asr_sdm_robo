# D435i VIO Camera Parameters - Complete Configuration
# Includes: camera intrinsics, IMU calibration, T_cam_imu, VIO weights
#
# Usage: ros2 launch svo_ros d435i_vio.launch.py
#
# NOTE: Launch file should ONLY load this file. Do NOT load d435i_imu.yaml separately
# as it uses EuRoC YAML format (not ros__parameters) and will override IMU values
# with incorrect C++ defaults.

/asr_sdm_video_inertial_odometry:
  ros__parameters:

    # === Camera Model (D435i RGB, 640x480) ===
    cam_model: Pinhole
    cam_width: 640
    cam_height: 480
    cam_fx: 452.97
    cam_fy: 603.87
    cam_cx: 330.59
    cam_cy: 259.46
    cam_d0: 0.0
    cam_d1: 0.0
    cam_d2: 0.0
    cam_d3: 0.0

    # === Feature Detection ===
    grid_size: 20                # 640x480 / 20 = 32 cells per axis
    n_pyr_levels: 8
    fast_type: 10
    detector_threshold_primary: 4   # Default SVO value - catch most corners
    detector_threshold_secondary: 200
    detector_threshold_shitomasi: 40  # Default SVO value
    max_epi_search_steps: 30000  # Raised from 5000: supports px_length up to 21k px (enough for indoor scenes)
    triang_min_corner_score: 5.0    # Default SVO value

    # === Feature & Keyframe Numbers ===
    max_fts: 300
    max_map_fts: 600
    max_n_kfs: 60
    map_scale: 3.0
    quality_min_fts: 15            # Lowered from 30: allow tracking to continue with fewer features
    quality_max_drop_fts: 80        # Allow up to 80 feature drop before failure

    # === Keyframe Selection ===
    kfselect_criterion: FORWARD      #OPTIMAL/FORWARD
    kfselect_numkfs_upper_thresh: 20
    kfselect_numkfs_lower_thresh: 10
    kfselect_mindist: 0.04         # Default SVO value
    kfselect_min_angle: 10
    kfselect_min_disparity: 15     # Default SVO value
    update_seeds_with_old_keyframes: True

    # === Initialization ===
    init_min_features: 100
    init_min_disparity: 30.0
    init_min_tracked: 50
    init_min_inliers: 40

    # === Image Alignment (SparseImgAlign) ===
    img_align_max_level: 4
    img_align_min_level: 0         # Start from full resolution for initial frames
    klt_max_level: 4
    klt_min_level: 0
    patch_match_thresh_factor: 1.4
    subpix_n_iter: 30

    # === Reprojection ===
    use_async_reprojectors: False
    reprojector_max_n_kfs: 5
    reproject_unconverged_seeds: True
    max_unconverged_seeds_ratio: 0.2
    reproj_thresh: 2.0

    # === Pose Optimization ===
    poseoptim_thresh: 2.0
    poseoptim_using_unit_sphere: False
    pose_optim_num_iter: 10

    # === Structure Optimization ===
    structure_optim_max_pts: 20
    structure_optim_num_iter: 5

    # === Depth Filter ===
    seed_convergence_sigma2_thresh: 200
    mappoint_convergence_sigma2_thresh: 500
    relocalization_max_trials: 5

    # === Affine Illumination Compensation ===
    img_align_est_illumination_gain: true
    img_align_est_illumination_offset: true
    depth_filter_affine_est_offset: true
    depth_filter_affine_est_gain: false
    reprojector_affine_est_offset: true
    reprojector_affine_est_gain: false

    # === Outlier Rejection ===
    ransac3d_inlier_percent: 35
    use_outlier_rejection: true
    outlier_rejection_px_threshold: 2.0

    # === Local Bundle Adjustment (g2o) ===
    loba_num_iter: 0
    core_n_kfs: 3
    loba_thresh: 2.0
    loba_robust_huber_width: 1.0
    backend_only_use_corners: false
    backend_scale_stable_thresh: 0.01
    kfselect_backend_max_time_sec: 0.5

    # === Loop Closing ===
    runlc: False

    # === Basic Parameters ===
    pipeline_is_stereo: False
    automatic_reinitialization: True

    # === Visualization ===
    publish_marker_scale: 0.5
    publish_active_kfs: True
    publish_img_pyr_level: 0
    publish_every_nth_img: 1
    publish_every_nth_dense_input: 4
    publish_world_in_cam_frame: true
    publish_point_display_time: 0.0
    publish_map_every_frame: False

    # ================================================================
    # === IMU VIO Parameters (D435i BMI055) ===
    # ================================================================
    use_imu: true

    # === Topic (set via launch arg, here as fallback) ===
    imu_topic: "/sensing/camera/realsense/imu"

    # === IMU Calibration (D435i BMI055 datasheet specs) ===
    # Gyro noise density: 3e-3 rad/s/sqrt(Hz)
    # Accel noise density: 1.2e-2 m/s^2/sqrt(Hz)
    imu_delay_imu_cam: 0.0
    imu_max_imu_delta_t: 0.1
    imu_acc_max: 200.0
    imu_omega_max: 20.0
    imu_gyro_noise_density: 3.0e-3
    imu_acc_noise_density: 1.2e-2
    imu_gyro_bias_rw: 3.0e-5
    imu_acc_bias_rw: 4.0e-4
    imu_gravity_magnitude: 9.81
    imu_rate: 200.0
    imu_velocity_sigma: 0.1
    imu_omega_bias_sigma: 0.01
    imu_acc_bias_sigma: 0.1

    # === IMU Temporal Stationary Check ===
    imu_temporal_stationary_check: false
    imu_temporal_window_length_sec: 0.5
    stationary_acc_sigma_thresh: 0.0
    stationary_gyr_sigma_thresh: 0.0

    # === IMU Preprocessing ===
    imu_preprocessing_mode: 0

    # ================================================================
    # === VIO: IMU Prior Weights ===
    # ================================================================
    # SparseImgAlign (frontend) - IMU gyro rotation prior
    img_align_prior_lambda_rot: 0.5
    img_align_prior_lambda_trans: 0.0

    # PoseOptimizer (backend BA) - disabled to avoid double-constraining
    pose_optim_prior_lambda_rot: 0.0
    pose_optim_prior_lambda_trans: 0.0

    # === Zero-Motion Detection ===
    zero_motion_accel_std_thresh: 0.05
    zero_motion_window_sec: 0.3
    backend_use_zero_motion_detection: true
    backend_zero_motion_check_n_frames: 5
    zero_motion_px_diff_threshold: 0.2
    zero_motion_ratio_moving_pixels_threshold: 0.1
    zero_motion_min_number_correspondences: 5
    zero_motion_max_features_to_check: 15
    zero_motion_sigma: 0.1

    # ================================================================
    # === Camera-IMU Extrinsics ===
    # camera_optical_frame -> imu_optical_frame
    # Extracted from bag /tf_static (D435i datasheet offsets)
    # T_cam_imu = [R | t]; p_imu = R^T * (p_cam - t)
    # ~0.6deg rotation, ~5mm/11mm/20mm translation
    # ================================================================
    T_cam_imu:
      [0.9999502031, -0.0081739433, -0.0057252080,  0.0051595441,
       0.0081556205,  0.9999615694, -0.0032164528,  0.0110255161,
       0.0057512790,  0.0031696000,  0.9999784380,  0.0203327692,
       0.0000000000,  0.0000000000,  0.0000000000,  1.0000000000]
